<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casino Royale - Multijoueur</title>
    <script src="https://cdn.jsdelivr.net/npm/socket.io-client@4.7.5/dist/socket.io.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Georgia', serif; }
        body { background: radial-gradient(circle, #1a1a1a 0%, #0a0a0a 100%); color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 10px; overflow-x: hidden; }
        
        /* Correction radicale du bloc connexion */
        .login-screen { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:100; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        #username-input { width: 250px !important; padding: 10px; border-radius: 20px; border: 1px solid #ffd700; background: #000; color: #fff; text-align: center; font-size: 1rem; display: block; margin: 0 auto 20px auto; }
        .join-btn { padding: 10px 30px; background: #1e7e34; border: 1px solid #ffd700; color: white; border-radius: 20px; cursor: pointer; font-weight: bold; }

        .home-btn { position: absolute; top: 15px; left: 15px; background: rgba(255, 255, 255, 0.1); color: white; padding: 8px 12px; border-radius: 50%; text-decoration: none; font-size: 1.2rem; border: 1px solid #ffd700; z-index: 10; }
        h1 { margin: 5px 0; font-size: 1.4rem; color: #ffd700; text-align: center; }
        .bank-info { display: flex; gap: 25px; margin-bottom: 10px; font-size: 0.95rem; background: rgba(0,0,0,0.6); padding: 6px 25px; border-radius: 30px; border: 1px solid #ffd700; }
        .table { width: 100%; max-width: 800px; background: radial-gradient(circle, #0e5c33 60%, #073a1f 100%); border: 12px solid #3d2314; border-radius: 40px; padding: 20px; position: relative; height: 440px; margin-bottom: 10px; }
        .players-container { position: absolute; bottom: 15px; left: 0; width: 100%; display: flex; justify-content: space-around; padding: 0 10px; }
        .player-spot { display: flex; flex-direction: column; align-items: center; background: rgba(0,0,0,0.4); padding: 6px; border-radius: 8px; border: 1px solid rgba(255, 215, 0, 0.1); width: 120px; }
        .token { width: 44px; height: 44px; border-radius: 50%; border: 3px dashed #fff; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: bold; color: white; cursor: pointer; }
        .token-5 { background: #cc2424; border-color: #ffd700; }  
        .token-25 { background: #1a54a1; border-color: #fff; }    
        .token-100 { background: #1a1a1a; border-color: #ffd700; } 
        .token-rack { display: flex; gap: 12px; justify-content: center; margin: 8px 0; background: rgba(0,0,0,0.5); padding: 8px 20px; border-radius: 40px; }
        .controls { display: flex; gap: 10px; justify-content: center; width: 100%; max-width: 440px; }
        button { padding: 10px 20px; border-radius: 30px; border: 2px solid rgba(255,255,255,0.2); cursor: pointer; color: white; font-weight: bold; }
    </style>
</head>
<body>
    <div id="login-screen" class="login-screen">
        <h1 style="margin-bottom: 20px;">TON PSEUDO</h1>
        <input type="text" id="username-input" placeholder="Pseudo..." maxlength="10">
        <button class="join-btn" onclick="joinGame()">ENTRER</button>
    </div>

    <a href="index.html" class="home-btn">🏠</a>
    <h1>CASINO ROYALE</h1>
    <div class="bank-info">
        <div>Solde : <span id="balance-val">1000</span> $</div>
        <div>Mise : <span id="bet-val">0</span> $</div>
    </div>
    <div class="table">
        <div id="players-box" class="players-container"></div>
    </div>
    <div class="token-rack">
        <div class="token token-5" onclick="sendBet(5)">5$</div>
        <div class="token token-25" onclick="sendBet(25)">25$</div>
        <div class="token token-100" onclick="sendBet(100)">100$</div>
    </div>
    <div class="controls">
        <button onclick="clearBet()">Effacer</button>
        <button onclick="startRound()">Distribuer</button>
    </div>

    <script>
        const socket = io("https://blackjack-8uar.onrender.com");
        let myId = null;
        function joinGame() {
            const pseudo = document.getElementById('username-input').value || "Anonyme";
            socket.emit('setPseudo', pseudo);
            document.getElementById('login-screen').style.display = 'none';
        }
        socket.on('connect', () => { myId = socket.id; });
        socket.on('gameState', (state) => {
            const pBox = document.getElementById('players-box'); pBox.innerHTML = '';
            Object.values(state.players).forEach(p => {
                const isMe = p.id === myId;
                if(isMe) { document.getElementById('balance-val').innerText = p.balance; document.getElementById('bet-val').innerText = p.bet; }
                pBox.innerHTML += `<div class="player-spot"><div style="font-weight:bold; color:#ffd700">${p.name}</div><div>${p.score}</div></div>`;
            });
        });
        function sendBet(a) { socket.emit('placeBet', a); }
        function clearBet() { socket.emit('clearBet'); }
        function startRound() { socket.emit('startRound'); }
    </script>
</body>
</html>
