<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casino Royale - Multijoueur</title>
    <script src="https://cdn.jsdelivr.net/npm/socket.io-client@4.7.5/dist/socket.io.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Georgia', serif; }
        body { background: radial-gradient(circle, #1a1a1a 0%, #0a0a0a 100%); color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 10px; overflow-x: hidden; }
        .login-screen { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:100; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        .home-btn { position: absolute; top: 15px; left: 15px; background: rgba(255, 255, 255, 0.1); color: white; padding: 8px 12px; border-radius: 50%; text-decoration: none; font-size: 1.2rem; border: 1px solid #ffd700; z-index: 10; }
        h1 { font-size: 1.4rem; color: #ffd700; text-align: center; margin-bottom: 20px; }
        input { padding: 10px; border-radius: 20px; border: 1px solid #ffd700; background: #000; color: #fff; text-align: center; margin-bottom: 15px; }
        button.join-btn { padding: 10px 30px; background: #1e7e34; border: none; color: white; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .bank-info { display: flex; gap: 25px; margin-bottom: 10px; font-size: 0.95rem; background: rgba(0,0,0,0.6); padding: 6px 25px; border-radius: 30px; border: 1px solid #ffd700; }
        .table { width: 100%; max-width: 800px; background: radial-gradient(circle, #0e5c33 60%, #073a1f 100%); border: 12px solid #3d2314; border-radius: 40px; padding: 20px; height: 440px; position: relative; }
        .zone-dealer { position: absolute; top: 20px; left: 0; width: 100%; display: flex; flex-direction: column; align-items: center; }
        .players-container { position: absolute; bottom: 15px; left: 0; width: 100%; display: flex; justify-content: space-around; padding: 0 10px; }
        .player-spot { display: flex; flex-direction: column; align-items: center; background: rgba(0,0,0,0.4); padding: 6px; border-radius: 8px; border: 1px solid rgba(255, 215, 0, 0.1); width: 100px; }
        .player-spot.current-user { border-color: #ffd700; }
        .zone-title { font-size: 0.7rem; font-weight: bold; color: #ffd700; }
        .card { width: 40px; height: 60px; background: #fff; color: #000; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: bold; margin: 0 -10px; }
        .token-rack { display: flex; gap: 10px; justify-content: center; margin: 10px 0; }
        .controls { display: flex; gap: 10px; justify-content: center; }
    </style>
</head>
<body>
    <div id="login-screen" class="login-screen">
        <h1>CHOISIS TON PSEUDO</h1>
        <input type="text" id="username-input" placeholder="Ton pseudo..." maxlength="10">
        <button class="join-btn" onclick="joinGame()">ENTRER</button>
    </div>

    <a href="index.html" class="home-btn">🏠</a>
    <h1>CASINO ROYALE</h1>
    <div class="bank-info">
        <div>Solde : <span id="balance-val">1000</span> $</div>
        <div>Mise : <span id="bet-val">0</span> $</div>
    </div>
    <div class="table">
        <div class="zone-dealer"><div class="zone-title">Croupier (<span id="dealer-score">0</span>)</div><div id="dealer-cards" style="display:flex"></div></div>
        <div class="players-container" id="players-box"></div>
    </div>
    <div id="msg">En attente...</div>
    <div class="token-rack" id="rack"><button onclick="sendBet(5)">5$</button><button onclick="sendBet(25)">25$</button></div>
    <div class="controls" id="controls-container"><button onclick="clearBet()">Effacer</button><button onclick="startRound()">Distribuer</button></div>

    <script>
        const socket = io("https://blackjack-8uar.onrender.com");
        let myId = null;
        function joinGame() {
            const pseudo = document.getElementById('username-input').value || "Anonyme";
            socket.emit('setPseudo', pseudo);
            document.getElementById('login-screen').style.display = 'none';
        }
        socket.on('connect', () => { myId = socket.id; });
        socket.on('gameState', (state) => {
            document.getElementById('dealer-score').innerText = state.dealerScore;
            document.getElementById('dealer-cards').innerHTML = '';
            state.dealerCards.forEach(c => {
                let div = document.createElement('div'); div.className = 'card'; div.innerText = c.value;
                document.getElementById('dealer-cards').appendChild(div);
            });
            const pBox = document.getElementById('players-box'); pBox.innerHTML = '';
            Object.values(state.players).forEach(p => {
                const isMe = p.id === myId;
                if(isMe) { document.getElementById('balance-val').innerText = p.balance; document.getElementById('bet-val').innerText = p.bet; }
                pBox.innerHTML += `<div class="player-spot ${isMe ? 'current-user' : ''}"><div class="zone-title">${p.name}</div><div>${p.score}</div><div class="zone-title">${isMe ? p.bet+'$' : '***'}</div></div>`;
            });
        });
        function sendBet(a) { socket.emit('placeBet', a); }
        function clearBet() { socket.emit('clearBet'); }
        function startRound() { socket.emit('startRound'); }
    </script>
</body>
</html>
